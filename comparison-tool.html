<script>
// ============================================================================
// LOAD CONFIG
// ============================================================================
const LO = JSON.parse(document.getElementById('lo-config').textContent);
document.documentElement.style.setProperty('--brand', LO.brandColor || '#0c4a6e');
document.documentElement.style.setProperty('--accent', LO.accentColor || '#0ea5e9');
document.title = `Mortgage Comparison Tool — ${LO.name}`;

// PDF.js worker
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ============================================================================
// STATE
// ============================================================================
const state = {
  step: 'intro',          // intro | upload | manual | review | leadcapture | results
  path: null,             // 'upload' | 'manual'
  quote: {
    loanAmount: '',
    interestRate: '',
    termYears: 30,
    loanType: 'conventional',
    monthlyPI: '',
    points: 0,
    lenderCredits: 0,
    closingCosts: '',
    propertyTaxes: '',
    insurance: '',
    pmi: '',
    homeValue: '',
    zip: '',
    purpose: 'purchase',
    creditScore: '740+',
    occupancy: 'primary'
  },
  lead: { firstName: '', lastName: '', email: '', phone: '', consent: false, tcpa: false },
  results: null,
  pdfText: null,
  pdfError: null,
  submitting: false
};

// ============================================================================
// HELPERS
// ============================================================================
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const fmtMoney = (n) => isFinite(n) ? '$' + Math.round(n).toLocaleString('en-US') : '—';
const fmtMoneyCents = (n) => isFinite(n) ? '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '—';
const fmtPct = (n, decimals = 3) => isFinite(n) ? Number(n).toFixed(decimals) + '%' : '—';
const parseNum = (s) => {
  if (s === null || s === undefined || s === '') return NaN;
  const cleaned = String(s).replace(/[^0-9.\-]/g, '');
  return cleaned === '' ? NaN : parseFloat(cleaned);
};

function monthlyPI(principal, annualRate, termYears) {
  const r = annualRate / 100 / 12;
  const n = termYears * 12;
  if (!isFinite(r) || !isFinite(n) || n <= 0) return NaN;
  if (r === 0) return principal / n;
  return principal * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}

function totalInterest(principal, annualRate, termYears) {
  const mp = monthlyPI(principal, annualRate, termYears);
  return (mp * termYears * 12) - principal;
}

function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function validatePhone(p) { return String(p).replace(/\D/g, '').length >= 10; }

// ============================================================================
// PDF PARSING (best-effort extraction from a Loan Estimate or quote sheet)
// ============================================================================
async function extractPdfText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  return text;
}

function parseLoanEstimate(text) {
  const out = {};
  const cleaned = text.replace(/\s+/g, ' ');

  // Loan amount
  const loanAmountMatch = cleaned.match(/Loan\s+Amount[\s:]*\$?([\d,]+)/i);
  if (loanAmountMatch) out.loanAmount = loanAmountMatch[1].replace(/,/g, '');

  // Interest rate
  const rateMatch = cleaned.match(/Interest\s+Rate[\s:]*([\d.]+)\s*%/i) ||
                    cleaned.match(/Rate[\s:]*([\d.]+)\s*%/i);
  if (rateMatch) out.interestRate = rateMatch[1];

  // Term
  const termMatch = cleaned.match(/(\d{1,2})\s*year[s]?/i) ||
                    cleaned.match(/Loan\s+Term[\s:]*(\d{1,2})/i);
  if (termMatch) out.termYears = parseInt(termMatch[1], 10);

  // Monthly P&I
  const piMatch = cleaned.match(/Principal\s*(?:&|and)\s*Interest[\s:]*\$?([\d,]+(?:\.\d{1,2})?)/i) ||
                  cleaned.match(/Monthly\s+Principal\s*(?:&|and)\s*Interest[\s:]*\$?([\d,]+)/i);
  if (piMatch) out.monthlyPI = piMatch[1].replace(/,/g, '');

  // Closing costs / total
  const closingMatch = cleaned.match(/Estimated\s+Closing\s+Costs[\s:]*\$?([\d,]+)/i) ||
                       cleaned.match(/Total\s+(?:Closing|Settlement)\s+Costs[\s:]*\$?([\d,]+)/i);
  if (closingMatch) out.closingCosts = closingMatch[1].replace(/,/g, '');

  // Property taxes
  const taxMatch = cleaned.match(/(?:Property\s+)?Tax(?:es)?[\s:]*\$?([\d,]+(?:\.\d{1,2})?)/i);
  if (taxMatch) out.propertyTaxes = taxMatch[1].replace(/,/g, '');

  // Insurance
  const insMatch = cleaned.match(/(?:Homeowners?\s+)?Insurance[\s:]*\$?([\d,]+(?:\.\d{1,2})?)/i);
  if (insMatch) out.insurance = insMatch[1].replace(/,/g, '');

  // MI / PMI
  const miMatch = cleaned.match(/Mortgage\s+Insurance[\s:]*\$?([\d,]+(?:\.\d{1,2})?)/i);
  if (miMatch) out.pmi = miMatch[1].replace(/,/g, '');

  // Sale price / home value
  const priceMatch = cleaned.match(/(?:Sale\s+Price|Property\s+Value|Appraised\s+Value)[\s:]*\$?([\d,]+)/i);
  if (priceMatch) out.homeValue = priceMatch[1].replace(/,/g, '');

  // ZIP
  const zipMatch = cleaned.match(/\b(\d{5})(?:-\d{4})?\b/);
  if (zipMatch) out.zip = zipMatch[1];

  // Loan type
  if (/\bFHA\b/i.test(cleaned)) out.loanType = 'fha';
  else if (/\bVA\b/i.test(cleaned)) out.loanType = 'va';
  else if (/\bUSDA\b/i.test(cleaned)) out.loanType = 'usda';
  else if (/\bJumbo\b/i.test(cleaned)) out.loanType = 'jumbo';
  else out.loanType = 'conventional';

  return out;
}

// ============================================================================
// COMPARISON ENGINE
// ============================================================================
function buildComparison(q) {
  const principal = parseNum(q.loanAmount);
  const theirRate = parseNum(q.interestRate);
  const term = parseInt(q.termYears, 10) || 30;
  const theirClosing = parseNum(q.closingCosts) || 0;
  let theirMonthlyPI = parseNum(q.monthlyPI);
  if (!isFinite(theirMonthlyPI)) theirMonthlyPI = monthlyPI(principal, theirRate, term);

  // Determine our comparable rate
  let ourRate, rateLow, rateHigh, rateLabel;
  const key = `${q.loanType}${term}`;
  const configured = LO.pricing && LO.pricing[key];

  if (LO.estimateMode === 'specific' && configured) {
    ourRate = configured;
    rateLow = configured;
    rateHigh = configured;
    rateLabel = 'Estimated comparable rate';
  } else {
    // Conservative: show a range. Center = either configured base or their rate - 0.25
    const center = configured || Math.max(theirRate - 0.25, 5.5);
    rateLow = center - 0.125;
    rateHigh = center + 0.125;
    ourRate = center;
    rateLabel = 'Estimated rate range in today’s market';
  }

  const ourMonthlyPI = monthlyPI(principal, ourRate, term);
  const ourMonthlyPILow = monthlyPI(principal, rateHigh, term); // higher rate = higher P&I = "low savings"
  const ourMonthlyPIHigh = monthlyPI(principal, rateLow, term);

  const theirTotalInt = totalInterest(principal, theirRate, term);
  const ourTotalInt = totalInterest(principal, ourRate, term);
  const ourTotalIntLow = totalInterest(principal, rateHigh, term);
  const ourTotalIntHigh = totalInterest(principal, rateLow, term);

  const ourClosing = (LO.fees?.origination || 0) + (LO.fees?.underwriting || 0) + (LO.fees?.processing || 0);

  const monthlyDiff = theirMonthlyPI - ourMonthlyPI;
  const monthlyDiffLow = theirMonthlyPI - ourMonthlyPILow;
  const monthlyDiffHigh = theirMonthlyPI - ourMonthlyPIHigh;

  const lifetimeDiff = theirTotalInt - ourTotalInt;
  const lifetimeDiffLow = theirTotalInt - ourTotalIntLow;
  const lifetimeDiffHigh = theirTotalInt - ourTotalIntHigh;

  // Break-even on fees (if our fees are higher but rate is lower)
  let breakEvenMonths = null;
  const feeDiff = ourClosing - theirClosing;
  if (feeDiff > 0 && monthlyDiff > 0) {
    breakEvenMonths = Math.ceil(feeDiff / monthlyDiff);
  }

  return {
    principal,
    term,
    their: {
      rate: theirRate,
      monthlyPI: theirMonthlyPI,
      totalInterest: theirTotalInt,
      closingCosts: theirClosing
    },
    ours: {
      rate: ourRate,
      rateLow,
      rateHigh,
      rateLabel,
      monthlyPI: ourMonthlyPI,
      monthlyPILow: ourMonthlyPILow,
      monthlyPIHigh: ourMonthlyPIHigh,
      totalInterest: ourTotalInt,
      totalInterestLow: ourTotalIntLow,
      totalInterestHigh: ourTotalIntHigh,
      closingCosts: ourClosing
    },
    monthlyDiff,
    monthlyDiffLow,
    monthlyDiffHigh,
    lifetimeDiff,
    lifetimeDiffLow,
    lifetimeDiffHigh,
    breakEvenMonths,
    mode: LO.estimateMode || 'conservative'
  };
}

// ============================================================================
// LEAD SUBMISSION
// ============================================================================
async function submitLead() {
  const payload = {
    timestamp: new Date().toISOString(),
    loanOfficer: LO.name,
    loanOfficerNmls: LO.nmlsId,
    lead: { ...state.lead },
    quote: { ...state.quote },
    sourcePage: window.location.href,
    referrer: document.referrer || ''
  };

  if (!LO.webhookUrl) {
    console.warn('No webhook URL configured. Lead data:', payload);
    return { ok: true, note: 'no-webhook' };
  }

  try {
    // Google Apps Script expects a simple POST. Use no-cors as fallback to bypass CORS preflight.
    const res = await fetch(LO.webhookUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return { ok: true };
  } catch (e) {
    console.error('Lead submit error', e);
    return { ok: false, error: e.message };
  }
}

          <div class="flex gap-1">${stateBadges}</div>
        </div>
      </div>
    </header>
  `;
}

function renderStepper() {
  const steps = [
    { id: 'intro', label: 'Start' },
    { id: 'input', label: 'Your Quote' },
    { id: 'review', label: 'Review' },
    { id: 'leadcapture', label: 'Your Info' },
    { id: 'results', label: 'Results' }
  ];
  const currentIdx = (() => {
    if (state.step === 'intro') return 0;
    if (state.step === 'upload' || state.step === 'manual') return 1;
    if (state.step === 'review') return 2;
    if (state.step === 'leadcapture') return 3;
    return 4;
  })();
  return `
    <div class="flex items-center justify-between mb-6 sm:mb-10 px-2 overflow-x-auto">
      ${steps.map((s, i) => `
        <div class="flex items-center ${i < steps.length - 1 ? 'flex-1' : ''} min-w-0">
          <div class="flex flex-col items-center gap-1">
            <div class="step-dot ${i < currentIdx ? 'done' : i === currentIdx ? 'active' : 'todo'}">
              ${i < currentIdx ? '&#10003;' : i + 1}
            </div>
            <div class="text-xs ${i === currentIdx ? 'text-brand font-semibold' : 'text-gray-500'} whitespace-nowrap">${s.label}</div>
          </div>
          ${i < steps.length - 1 ? `<div class="flex-1 h-px ${i < currentIdx ? 'bg-emerald-500' : 'bg-gray-300'} mx-2"></div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function renderStep() {
  switch (state.step) {
    case 'intro': return renderIntro();
    case 'upload': return renderUpload();
    case 'manual': return renderManual();
    case 'review': return renderReview();
    case 'leadcapture': return renderLeadCapture();
    case 'results': return renderResults();
    default: return renderIntro();
  }
}

function renderUpload() {

function renderManual() {
  const q = state.quote;
  return `

      </div>
      <p class="text-gray-600 mb-6">Fill in what you have from your quote. We'll fill the rest with reasonable defaults.</p>

      <form id="manual-form" class="space-y-4">
        <div class="grid sm:grid-cols-2 gap-4">

              <option value="va" ${q.loanType==='va'?'selected':''}>VA</option>
              <option value="jumbo" ${q.loanType==='jumbo'?'selected':''}>Jumbo</option>
              <option value="usda" ${q.loanType==='usda'?'selected':''}>USDA</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Purpose</label>
            <select name="purpose" class="ring-brand w-full border border-gray-300 rounded-lg px-3 py-2">
              <option value="purchase" ${q.purpose==='purchase'?'selected':''}>Purchase</option>

              <option value="cashout" ${q.purpose==='cashout'?'selected':''}>Cash-out refinance</option>
            </select>
          </div>
        </div>

function renderResults() {
  const r = state.results;
  if (!r) return `<div class="text-center py-12 text-gray-500">Calculating…</div>`;

  const isConservative = r.mode !== 'specific';
  const positiveMonthly = r.monthlyDiff > 0;

  // Range strings for conservative mode
  const monthlyText = isConservative
    ? `${fmtMoney(Math.min(r.monthlyDiffLow, r.monthlyDiffHigh))} – ${fmtMoney(Math.max(r.monthlyDiffLow, r.monthlyDiffHigh))}`
    : fmtMoney(r.monthlyDiff);

  const lifetimeText = isConservative
    ? `${fmtMoney(Math.min(r.lifetimeDiffLow, r.lifetimeDiffHigh))} – ${fmtMoney(Math.max(r.lifetimeDiffLow, r.lifetimeDiffHigh))}`
    : fmtMoney(r.lifetimeDiff);

  const ourRateText = isConservative
    ? `${fmtPct(r.ours.rateLow)} – ${fmtPct(r.ours.rateHigh)}`
    : fmtPct(r.ours.rate);

  const ourPIText = isConservative
    ? `${fmtMoney(Math.min(r.ours.monthlyPILow, r.ours.monthlyPIHigh))} – ${fmtMoney(Math.max(r.ours.monthlyPILow, r.ours.monthlyPIHigh))}`
    : fmtMoney(r.ours.monthlyPI);

  const ourInterestText = isConservative
    ? `${fmtMoney(Math.min(r.ours.totalInterestLow, r.ours.totalInterestHigh))} – ${fmtMoney(Math.max(r.ours.totalInterestLow, r.ours.totalInterestHigh))}`
    : fmtMoney(r.ours.totalInterest);

  return `
    <div class="space-y-6">
      <!-- Hero Result Card -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-brand text-white p-6 sm:p-8">
          <div class="text-sm uppercase tracking-wide opacity-80 mb-1">Your Illustrative Comparison</div>
          <div class="flex items-end gap-2 flex-wrap">
            <div class="text-3xl sm:text-4xl font-bold">
              ${positiveMonthly ? 'Potential savings:' : 'Estimated difference:'}
            </div>
          </div>
          <div class="text-2xl sm:text-3xl mt-2 ${positiveMonthly ? '' : 'opacity-80'}">
            <strong>${monthlyText}</strong> <span class="text-base opacity-80">/ month</span>
          </div>
          <div class="text-sm mt-1 opacity-80">
            ${positiveMonthly ? `Up to <strong>${lifetimeText}</strong> over the life of the loan` : `Over the life of the loan: ${lifetimeText}`}
          </div>
        </div>

        <div class="p-6 sm:p-8">
          <div class="grid sm:grid-cols-2 gap-6">
            <!-- Their Quote -->
            <div class="border border-gray-200 rounded-xl p-5">
              <div class="text-xs uppercase tracking-wide text-gray-500 font-semibold mb-3">Your Current Quote</div>
              <div class="space-y-2 text-sm">
                ${rowLabel('Interest Rate', fmtPct(r.their.rate))}
                ${rowLabel('Loan Amount', fmtMoney(r.principal))}
                ${rowLabel('Term', r.term + ' years')}
                ${rowLabel('Monthly P&amp;I', fmtMoney(r.their.monthlyPI))}
                ${rowLabel('Total Interest', fmtMoney(r.their.totalInterest))}
                ${r.their.closingCosts > 0 ? rowLabel('Est. Closing Costs', fmtMoney(r.their.closingCosts)) : ''}
              </div>
            </div>

            <!-- Our Comparable -->
            <div class="border-2 border-brand rounded-xl p-5 bg-brand-soft">
              <div class="text-xs uppercase tracking-wide text-brand font-semibold mb-3">
                ${r.ours.rateLabel}
              </div>
              <div class="space-y-2 text-sm">
                ${rowLabel('Interest Rate', ourRateText)}
                ${rowLabel('Loan Amount', fmtMoney(r.principal))}
                ${rowLabel('Term', r.term + ' years')}
                ${rowLabel('Monthly P&amp;I', ourPIText)}
                ${rowLabel('Total Interest', ourInterestText)}
                ${r.ours.closingCosts > 0 ? rowLabel('Est. Lender Fees', fmtMoney(r.ours.closingCosts)) : ''}
              </div>
            </div>
          </div>

          ${r.breakEvenMonths ? `
            <div class="mt-6 p-4 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-900">
              <strong>Break-even point:</strong> Approximately ${r.breakEvenMonths} months — that's when the monthly savings would offset any difference in upfront fees.
            </div>
          ` : ''}
        </div>
      </div>

      <!-- LO CTA -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sm:p-8">
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6">
          ${LO.photoUrl
            ? `<img src="${LO.photoUrl}" alt="${LO.name}" class="w-20 h-20 rounded-full object-cover border-2 border-brand" />`
            : `<div class="w-20 h-20 rounded-full bg-brand text-white flex items-center justify-center text-2xl font-bold flex-shrink-0">${(LO.name||'').split(' ').map(s=>s[0]).join('').slice(0,2)}</div>`}
          <div class="flex-1 min-w-0">
            <div class="text-xl font-bold text-brand">${LO.name}</div>
            <div class="text-sm text-gray-600">${LO.title || 'Mortgage Loan Officer'} · NMLS #${LO.nmlsId}</div>
            <div class="text-sm text-gray-600">${LO.company}</div>
            ${LO.phone ? `<div class="text-sm text-gray-600 mt-1">${LO.phone}</div>` : ''}
            <div class="text-sm text-gray-600">${LO.email}</div>
          </div>
          <div class="flex flex-col gap-2 w-full sm:w-auto">
            ${LO.bookingLink ? `<a href="${LO.bookingLink}" target="_blank" rel="noopener" class="btn-primary text-center px-6 py-3 rounded-lg font-semibold">Book a 15-min Call</a>` : ''}
            ${LO.applicationLink ? `<a href="${LO.applicationLink}" target="_blank" rel="noopener" class="btn-outline text-center px-6 py-3 rounded-lg font-semibold">Start an Application</a>` : ''}
          </div>
        </div>

        <div class="mt-6 p-4 bg-gray-50 rounded-lg">
          <p class="text-sm text-gray-700">
            <strong>What's next?</strong> ${LO.name.split(' ')[0]} will reach out to walk through your comparison, answer questions, and confirm what your actual rate and terms could look like based on a full credit review.
          </p>
        </div>
      </div>

      <!-- Print/Save -->
      <div class="text-center">
        <button onclick="window.print()" class="text-brand underline text-sm">Print this comparison</button>
      </div>
    </div>
  `;
}

function rowLabel(label, value) {
  return `<div class="flex justify-between"><span class="text-gray-600">${label}</span><span class="font-semibold text-gray-900">${value}</span></div>`;
}

      <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        <div class="flex items-start gap-4 mb-4">
          <svg class="w-10 h-10 text-gray-400 flex-shrink-0" viewBox="0 0 100 100" fill="currentColor"><path d="M50 10 L10 35 L20 35 L20 80 L80 80 L80 35 L90 35 Z M35 80 L35 55 L65 55 L65 80 Z" /><text x="50" y="48" text-anchor="middle" font-size="10" fill="white">EHL</text></svg>
          <div>
            <p class="disclaimer">
              ${LO.complianceFooter || 'All loans subject to approval. Equal Housing Lender.'}
            </p>
          </div>

          Powered by Gray Home Mortgage Tools
        </div>

// ============================================================================
// EVENT HANDLERS
// ============================================================================
function attachListeners() {
  // Action buttons
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      const action = el.dataset.action;
      handleAction(action, e);
    });
  });

  // PDF upload
  const pdfInput = $('#pdf-input');
  const dropzone = $('#dropzone');
  if (pdfInput) pdfInput.addEventListener('change', (e) => handlePdfFile(e.target.files[0]));
  if (dropzone) {
    dropzone.addEventListener('click', () => pdfInput.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('border-brand','bg-brand-soft'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-brand','bg-brand-soft'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('border-brand','bg-brand-soft');
      if (e.dataTransfer.files[0]) handlePdfFile(e.dataTransfer.files[0]);
    });
  }

  // Manual form
  const manualForm = $('#manual-form');
  if (manualForm) {
    manualForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(manualForm);
      Object.keys(state.quote).forEach(k => {
        if (fd.has(k)) state.quote[k] = fd.get(k);
      });
      if (!parseNum(state.quote.loanAmount) || !parseNum(state.quote.interestRate)) {
        alert('Please enter both a loan amount and an interest rate.');
        return;
      }
      state.step = 'review';
      render();
    });
  }

  // Lead capture
  const leadForm = $('#lead-form');
  if (leadForm) {
    leadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (state.submitting) return;
      const fd = new FormData(leadForm);
      const lead = {
        firstName: fd.get('firstName')?.trim() || '',
        lastName: fd.get('lastName')?.trim() || '',
        email: fd.get('email')?.trim() || '',
        phone: fd.get('phone')?.trim() || '',
        consent: !!fd.get('consent'),
        tcpa: !!fd.get('tcpa')
      };
      const errEl = $('#lead-error');
      errEl.classList.add('hidden');
      const errors = [];
      if (!lead.firstName || !lead.lastName) errors.push('Please enter your full name.');
      if (!validateEmail(lead.email)) errors.push('Please enter a valid email.');
      if (!validatePhone(lead.phone)) errors.push('Please enter a valid phone number.');
      if (!lead.consent || !lead.tcpa) errors.push('Both consent checkboxes are required to receive your comparison.');
      if (errors.length) {
        errEl.textContent = errors.join(' ');
        errEl.classList.remove('hidden');
        return;
      }
      state.lead = lead;
      state.submitting = true;
      $('#lead-submit').textContent = 'Submitting…';
      $('#lead-submit').disabled = true;

      // Calculate comparison
      state.results = buildComparison(state.quote);

      // Submit lead (fire and forget; we still show results even if webhook fails)
      await submitLead();

      state.submitting = false;
      state.step = 'results';
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
}

function handleAction(action) {
  switch (action) {
    case 'choose-upload':
      state.path = 'upload';
      state.step = 'upload';
      render();
      break;
    case 'choose-manual':
      state.path = 'manual';
      state.step = 'manual';
      render();
      break;
    case 'switch-manual':
      state.path = 'manual';
      state.step = 'manual';
      render();
      break;
    case 'back-intro':
      state.step = 'intro';
      render();
      break;
    case 'back-upload':
      state.step = 'upload';
      render();
      break;
    case 'back-manual':
      state.step = 'manual';
      render();
      break;
    case 'back-review':
      state.step = 'review';
      render();
      break;
    case 'to-leadcapture':
      state.step = 'leadcapture';
      render();
      break;
  }
}

async function handlePdfFile(file) {
  if (!file || file.type !== 'application/pdf') {
    $('#upload-status').innerHTML = `<div class="p-3 bg-red-50 border border-red-200 rounded text-sm text-red-800">Please upload a PDF file.</div>`;
    return;
  }
  $('#upload-status').innerHTML = `
    <div class="flex items-center gap-2 text-brand">
      <svg class="spinner w-5 h-5" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60 100" /></svg>
      <span class="text-sm">Reading your PDF…</span>
    </div>
  `;
  try {
    const text = await extractPdfText(file);
    const parsed = parseLoanEstimate(text);
    state.pdfText = text;

    // Merge parsed values into quote
    Object.keys(parsed).forEach(k => {
      if (parsed[k]) state.quote[k] = parsed[k];
    });

    $('#upload-status').innerHTML = `
      <div class="p-3 bg-green-50 border border-green-200 rounded text-sm text-green-800">
        <strong>Got it!</strong> We extracted what we could. Please review and confirm next.
      </div>
    `;
    setTimeout(() => {
      state.step = 'manual'; // use manual form pre-filled for confirmation
      state.path = 'upload';
      render();
    }, 700);
  } catch (e) {
    console.error(e);
    $('#upload-status').innerHTML = `
      <div class="p-3 bg-amber-50 border border-amber-200 rounded text-sm text-amber-900">
        We couldn't read this PDF automatically. No problem — <button data-action="switch-manual" class="underline font-semibold">enter your details manually</button> and we'll go from there.
      </div>
    `;
    document.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => handleAction(el.dataset.action));
    });
  }
}

// ============================================================================
// INIT
// ============================================================================
render();
</script>
